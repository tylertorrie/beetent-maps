<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#111111" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Bee Tent Field</title>
  <!-- MapLibre vendored locally (tablet/vendor) so the app loads with no internet
       when served from the ESP32 AP in the field. -->
  <link href="vendor/maplibre-gl.css" rel="stylesheet" />
  <script src="vendor/maplibre-gl.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>

  <!-- Top bar: field name + RTK fix badge (always visible) -->
  <div id="topbar">
    <div id="fieldname">No field</div>
    <div id="netpill" class="hidden">OFFLINE</div>
    <div id="fixbadge" class="fix-none">NO FIX</div>
  </div>

  <!-- Work-view tools: switch shelter pin labels between numbers and trays. -->
  <div id="worktools" class="hidden">
    <button id="btn-labelmode">Show trays</button>
  </div>

  <!-- Arrival banner: shown when within 10 ft of a shelter. -->
  <div id="arrival" class="hidden"></div>

  <!-- Bottom controls -->
  <div id="controls">
    <button id="btn-work" class="active">Work</button>
    <button id="btn-map">Map</button>
    <button id="btn-fields">Fields</button>
    <div id="stats"><span id="sats">0</span> sats &middot; HDOP <span id="hdop">--</span></div>
  </div>

  <!-- Field picker drawer -->
  <div id="fieldsheet" class="hidden">
    <div class="sheet-head">
      <span>Fields</span>
      <button id="btn-sync">&#8635; Sync</button>
      <button id="btn-close-fields">&times;</button>
    </div>
    <div id="crewbar">You are: <b id="crewname">—</b>
      <button id="btn-crew">Change</button></div>
    <ul id="fieldlist"></ul>
    <div id="syncnote"></div>
  </div>

  <!-- Point detail popup -->
  <div id="pointsheet" class="hidden">
    <div class="sheet-head">
      <span id="pt-label">S-00</span>
      <button id="btn-close-point">&times;</button>
    </div>
    <div id="pt-coords"></div>
    <label class="chk"><input type="checkbox" id="pt-visited" /> Placed</label>
    <textarea id="pt-note" placeholder="Note&hellip;"></textarea>
  </div>

  <!-- Firebase relay (online-only; safe to fail offline). compat SDK = simplest. -->
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script defer src="firebase-config.js"></script>
  <script defer src="publish.js"></script>
  <script defer src="db.js"></script>
  <script defer src="tiles.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
