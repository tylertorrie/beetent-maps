<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <link rel="manifest" href="manifest.webmanifest" />
  <!-- iOS: Safari ignores most of the manifest, so these drive the installed
       (Add to Home Screen) experience — fullscreen launch, status bar, icon. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Bee Field" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <title>Bee Tent Field</title>
  <!-- MapLibre vendored locally (tablet/vendor) so the app loads with no internet
       when served from the ESP32 AP in the field. -->
  <link href="vendor/maplibre-gl.css" rel="stylesheet" />
  <script src="vendor/maplibre-gl.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>

  <!-- Top bar: field name + RTK fix badge (always visible) -->
  <div id="topbar">
    <div id="fieldname">No field</div>
    <div id="netpill" class="hidden">OFFLINE</div>
    <div id="srcpill" class="src-none">&mdash; NO SIGNAL</div>
    <div id="fixbadge" class="fix-none">NO FIX</div>
  </div>

  <!-- Work-view tools: guidance camera + overlay layers + label mode. -->
  <div id="worktools" class="hidden">
    <button id="btn-tilt">Top-down</button>
    <button id="btn-layers">Layers</button>
    <button id="btn-labelmode">Show trays</button>
    <button id="btn-zoomin" class="wt-zoom">+</button>
    <button id="btn-zoomout" class="wt-zoom">&minus;</button>
    <button id="btn-recenter" class="hidden">&#9678; Recenter</button>
  </div>

  <!-- Work-mode layers drawer: independent overlay toggles (multiple at once). -->
  <div id="layerspanel" class="hidden">
    <div class="sheet-head">
      <span>Layers</span>
      <button id="btn-close-layers">&times;</button>
    </div>
    <div id="layers-body"></div>
  </div>

  <!-- Arrival banner: shown when within 10 ft of a shelter. -->
  <div id="arrival" class="hidden"></div>

  <!-- Bottom controls -->
  <div id="controls">
    <button id="btn-work" class="active">Work</button>
    <button id="btn-scan" class="accent">Scan</button>
    <button id="btn-map">Map</button>
    <button id="btn-checklist">Checklist</button>
    <button id="btn-fields">Fields</button>
    <div id="stats"><span id="sats">0</span> sats &middot; HDOP <span id="hdop">--</span></div>
  </div>

  <!-- Field picker drawer -->
  <div id="fieldsheet" class="hidden">
    <div class="sheet-head">
      <span>Fields</span>
      <button id="btn-sync">&#8635; Sync</button>
      <button id="btn-close-fields">&times;</button>
    </div>
    <div id="crewbar">You are: <b id="crewname">—</b>
      <button id="btn-crew">Change</button></div>
    <ul id="fieldlist"></ul>
    <div id="syncnote"></div>
  </div>

  <!-- Shelter-crew checklist drawer (counts fill from the active field) -->
  <div id="checklistsheet" class="hidden">
    <div class="sheet-head">
      <span>Shelter Crew Checklist</span>
      <span id="cl-progress" class="cl-progress"></span>
      <button id="btn-close-checklist">&times;</button>
    </div>
    <div id="checklist-body"></div>
  </div>

  <!-- Scan drawer: shelter placement + tray placement (QR via hardware
       scanner on http, or device camera on https). -->
  <div id="scansheet" class="hidden">
    <div class="sheet-head">
      <span>Scan</span>
      <span id="scan-progress" class="cl-progress"></span>
      <button id="btn-close-scan">&times;</button>
    </div>
    <div id="scan-body">
      <div class="scan-modes">
        <button id="scan-mode-shelter" class="active">Shelter</button>
        <button id="scan-mode-tray">Trays</button>
      </div>
      <div id="scan-context" class="hidden"></div>
      <input id="scan-input" type="text" autocomplete="off" autocapitalize="off"
             autocorrect="off" spellcheck="false"
             placeholder="Scan a QR code (or type) then Enter" />
      <div class="scan-actions">
        <button id="btn-scan-camera">Use camera</button>
        <button id="btn-scan-clearshelter" class="hidden">Change shelter</button>
      </div>
      <div id="scan-status"></div>
      <div id="scan-recent"></div>
    </div>
  </div>

  <!-- Camera scanner overlay (only when running in a secure context) -->
  <div id="camoverlay" class="hidden">
    <video id="cam-video" playsinline muted></video>
    <div id="cam-reticle"></div>
    <div id="cam-bar">
      <span id="cam-hint">Point at the QR code</span>
      <button id="btn-cam-close">Close camera</button>
    </div>
  </div>

  <!-- Point detail popup -->
  <div id="pointsheet" class="hidden">
    <div class="sheet-head">
      <span id="pt-label">S-00</span>
      <button id="btn-close-point">&times;</button>
    </div>
    <div id="pt-coords"></div>
    <label class="chk"><input type="checkbox" id="pt-visited" /> Placed</label>
    <textarea id="pt-note" placeholder="Note&hellip;"></textarea>
  </div>

  <!-- Firebase relay (online-only; safe to fail offline). compat SDK = simplest. -->
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script defer src="firebase-config.js"></script>
  <script defer src="publish.js"></script>
  <script defer src="db.js"></script>
  <script defer src="tiles.js"></script>
  <script defer src="vendor/jsQR.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
